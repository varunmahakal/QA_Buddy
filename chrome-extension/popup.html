<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      min-height: 200px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: #1e293b;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #334155;
    }
    .header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .header .title { font-weight: 700; font-size: 14px; color: #f1f5f9; }
    .header .sub   { font-size: 11px; color: #64748b; margin-top: 1px; }

    /* Body */
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* Session card */
    .session-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .session-card .label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .session-card .url   { color: #7dd3fc; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-card .steps { color: #94a3b8; font-size: 11px; margin-top: 4px; }
    .session-card.empty  .url { color: #475569; font-style: italic; }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-activate { background: #16a34a; color: #fff; }
    .btn-activate:not(:disabled):hover { background: #15803d; }
    .btn-stop     { background: #dc2626; color: #fff; }
    .btn-stop:not(:disabled):hover { background: #b91c1c; }

    /* Error */
    .error {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      padding: 8px 10px;
      color: #fca5a5;
      font-size: 12px;
      line-height: 1.4;
    }

    /* Status badge */
    .recording-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #f87171;
      font-weight: 600;
    }
    .recording-badge .dot-sm {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .divider { border: none; border-top: 1px solid #1e293b; }
    .hint { font-size: 11px; color: #475569; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <div>
      <div class="title">QA Buddy Recorder</div>
      <div class="sub" id="headerSub">Checking for active session…</div>
    </div>
  </div>

  <div class="body">
    <div class="session-card empty" id="sessionCard">
      <div class="label">Target Page</div>
      <div class="url" id="sessionUrl">No active session found</div>
      <div class="steps" id="sessionSteps" style="display:none"></div>
    </div>

    <div id="errorBox" class="error" style="display:none"></div>

    <button class="btn btn-activate" id="btnActivate" disabled>
      ▶ Activate Recorder
    </button>

    <button class="btn btn-stop" id="btnStop" disabled>
      ⏹ Stop Recording
    </button>

    <hr class="divider" />
    <p class="hint" id="hint">Open QA Buddy and click "Start Recording" first.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
